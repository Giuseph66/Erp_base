version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: neo_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neo_password}
      POSTGRES_DB: ${POSTGRES_DB:-neo_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - neo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neo_user} -d ${POSTGRES_DB:-neo_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: neo_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - neo_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Application
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: neo_app
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-neo_user}:${POSTGRES_PASSWORD:-neo_password}@postgres:5432/${POSTGRES_DB:-neo_db}
      REDIS_URL: redis://redis:6379
      PORT: ${APP_PORT:-3000}
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"
    volumes:
      - ./app/src:/app/src
      - ./app/package.json:/app/package.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - neo_network
    command: >
      sh -c "npm run migrate && npm start"

networks:
  neo_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
