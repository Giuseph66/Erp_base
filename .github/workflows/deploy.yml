name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run migrate

      - name: Run database seeds (production only)
        if: ${{ github.event.inputs.environment == 'production' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run seed

      - name: Deploy to environment
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
        run: |
          echo "Deploying to $DEPLOY_ENVIRONMENT"
          npm run deploy

      - name: Health check
        run: |
          echo "Running health check..."
          sleep 5
          curl -f ${{ secrets.APP_URL }}/health || exit 1

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment completed to ${{ github.event.inputs.environment || 'staging' }}"
